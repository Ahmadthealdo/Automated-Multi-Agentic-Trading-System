<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Multi-Agentic Trading System - LeetCode Dashboard</title>
    
    <!-- Google Fonts: Inter (LeetCode primary) & JetBrains Mono (monospaced data) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Theme Config Mapping to LeetCode Palette -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace']
                    },
                    colors: {
                        leetcode: {
                            bg: '#1A1A1A',
                            panel: '#232323',
                            border: '#3F3F3F',
                            accent: '#3DD9F7',
                            success: '#29B86F',
                            warning: '#FF7A45',
                            danger: '#EF4743',
                            text: '#E4E6EB',
                            textSecondary: '#A0A4A8'
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Custom CSS Stylesheet for LeetCode Overrides -->
    <link rel="stylesheet" href="/static/style.css?v=1.0.3">
</head>
<body class="bg-[#1A1A1A] text-[#E4E6EB] min-h-screen antialiased select-none">

    <!-- Mounting Node for React App -->
    <div id="root"></div>

    <!-- React 18 & ReactDOM 18 UMD Production CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel Standalone CDN for on-the-fly JSX Compilation in app.js -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- React Main Application Logic -->
    <script type="text/babel" data-presets="react" src="/static/app.js?v=1.0.3"></script>

</body>
</html>
